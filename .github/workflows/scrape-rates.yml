name: Scrape daily commodity rates

on:
  schedule:
      - cron: '30 0 * * *'
        workflow_dispatch: {}

        permissions:
          contents: write

          jobs:
            scrape:
                runs-on: ubuntu-latest
                    steps:
                          - uses: actions/checkout@v4

                                - uses: actions/setup-node@v4
                                        with:
                                                  node-version: '20'

                                                        - name: Install dependencies
                                                                run: npm install node-fetch cheerio

                                                                      - name: Run scraper
                                                                              run: node scrape-rates.js

                                                                                    - name: Commit updated rates.json
                                                                                            run: |
                                                                                                      git config user.name "rates-bot"
                                                                                                                git config user.email "actions@github.com"
                                                                                                                          git add public/rates.json
                                                                                                                                    git diff --staged --quiet || git commit -m "Update daily rates $(date -u +%Y-%m-%d)"
                                                                                                                                              git push
                                                                                                                                              
